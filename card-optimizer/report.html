<html lang="en">
<head>

<title>Your Card & Payment Report | Skilled Edge Group</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --bg:#F4F6F8; --surface:#FFFFFF; --border:#E5E7EB; --text-primary:#111827;
  --text-secondary:#4B5563; --text-muted:#9CA3AF; --blue:#0066FF; --blue-dark:#0052CC;
  --blue-light:#EBF2FF; --green:#10B981; --green-dark:#059669; --red:#EF4444; --orange:#F59E0B;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --radius:14px; --radius-sm:8px; --font-display:'Sora',sans-serif; --font-body:'DM Sans',sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:780px;margin:0 auto;padding:0 20px;}
.site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 0;}
.site-header .wrap{display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:var(--font-display);font-weight:800;font-size:18px;color:var(--text-primary);text-decoration:none;}
.report-actions{display:flex;gap:10px;}
.btn{font-family:var(--font-display);font-weight:700;font-size:14px;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue-dark);}
.btn-ghost{background:#fff;color:var(--text-secondary);border:1.5px solid var(--border);}

.banner{background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;text-align:center;padding:28px 20px;}
.banner .ok{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.9;}
.banner h1{font-family:var(--font-display);font-size:clamp(24px,5vw,34px);font-weight:800;margin:6px 0;}
.banner p{font-size:15px;opacity:.95;max-width:520px;margin:0 auto;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:28px;margin:24px 0;}
.rhero{text-align:center;}
.rhero .label{font-size:13px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.rhero .big{font-family:var(--font-display);font-size:clamp(40px,9vw,60px);font-weight:800;color:var(--green-dark);line-height:1;margin:6px 0;}
.rhero .sub{color:var(--text-secondary);font-size:14px;}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 0;}
.dual .box{border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.dual .box.first{background:#F0FDF8;border-color:var(--green);}
.dual .box .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:700;}
.dual .box .v{font-family:var(--font-display);font-size:24px;font-weight:800;margin-top:4px;}
.dual .box.first .v{color:var(--green-dark);}
.dual .box .n{font-size:11px;color:var(--text-muted);margin-top:3px;}

h2.sec{font-family:var(--font-display);font-size:20px;font-weight:800;margin:0 0 4px;}
p.secsub{color:var(--text-secondary);font-size:14px;margin-bottom:16px;}

.bar-row{margin-bottom:16px;}
.bar-row .bl{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px;}
.bar-row .bl .gain{color:var(--green-dark);}
.bar-track{position:relative;height:26px;background:var(--bg);border-radius:6px;overflow:hidden;}
.bar-cur{position:absolute;left:0;top:0;height:100%;background:repeating-linear-gradient(45deg,#CBD5E1,#CBD5E1 8px,#dbe1ea 8px,#dbe1ea 16px);border-radius:6px;}
.bar-opt{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--green),var(--green-dark));border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;}
.bar-legend{display:flex;gap:18px;font-size:12px;color:var(--text-muted);margin-top:4px;}
.bar-legend span{display:flex;align-items:center;gap:6px;}
.swatch{width:12px;height:12px;border-radius:3px;}
.swatch.cur{background:#CBD5E1;}.swatch.opt{background:var(--green);}

.rec{border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;}
.rec.top{border-color:var(--green);background:#F0FDF8;}
.rec.premium{border-color:var(--orange);background:#FFFBEB;}
.rec .tag{position:absolute;top:-10px;left:16px;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;text-transform:uppercase;letter-spacing:.03em;}
.rec.top .tag{background:var(--green);}.rec.premium .tag{background:var(--orange);}
.rec h4{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:baseline;}
.rec h4 .fee{font-size:12px;font-weight:600;color:var(--text-muted);}
.rec .why{font-size:13px;color:var(--text-secondary);}
.rec .yield{font-weight:700;color:var(--green-dark);font-size:14px;margin-top:6px;}
.rec .fine{font-size:11.5px;color:var(--text-muted);margin-top:6px;}

.step-list{counter-reset:step;list-style:none;}
.step-list li{position:relative;padding:12px 0 12px 44px;border-bottom:1px solid var(--border);font-size:14px;}
.step-list li:last-child{border-bottom:none;}
.step-list li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:12px;width:30px;height:30px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:14px;}
.step-list li b{color:var(--text-primary);}

.lever{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;}
.lever h4{font-family:var(--font-display);font-size:14.5px;font-weight:700;margin-bottom:3px;}
.lever p{font-size:13px;color:var(--text-secondary);}

.playbook li{font-size:14px;margin-bottom:8px;padding-left:4px;}
.playbook ul{padding-left:20px;}

.verified{font-size:11.5px;color:var(--text-muted);text-align:center;margin:8px 0 40px;line-height:1.6;padding:0 10px;}
.foot{text-align:center;padding:0 0 48px;font-size:12px;color:var(--text-muted);line-height:1.7;}
.foot a{color:var(--text-secondary);}
.err-state{text-align:center;padding:60px 20px;}
.err-state h1{font-family:var(--font-display);font-size:24px;margin-bottom:10px;}
.err-state p{color:var(--text-secondary);max-width:440px;margin:0 auto 16px;}

/* deep card detail */
.cardrate{font-size:13.5px;color:var(--text-secondary);margin:6px 0;}
.cardwhy{font-size:13.5px;color:var(--text-primary);margin:6px 0;}
.cardmath{background:#F8FAFC;border-radius:var(--radius-sm);padding:12px 14px;margin:10px 0;}
.cardmath .mathlabel{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);margin-bottom:6px;}
.cardmath ul{margin:0;padding-left:18px;}
.cardmath li{font-size:13px;margin-bottom:5px;color:var(--text-secondary);}
.cardbonus{font-size:13px;font-weight:600;color:var(--green-dark);margin-top:8px;}
.mathlabel{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);}
.ex{font-size:12.5px;color:var(--text-muted);font-style:italic;}

/* points page */
.ptsgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0;}
.ptsbox{border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.ptsbox.best{border-color:var(--green);background:#F0FDF8;}
.ptsbox .l{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);font-weight:700;}
.ptsbox .v{font-family:var(--font-display);font-size:21px;font-weight:800;margin:4px 0;}
.ptsbox.best .v{color:var(--green-dark);}
.ptsbox .n{font-size:11px;color:var(--text-muted);}
.ptstable,.achtable{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;}
.ptstable th,.ptstable td,.achtable td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
.ptstable th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);font-weight:700;}
.ptstable .cpp{font-weight:700;color:var(--green-dark);white-space:nowrap;}
.ptswarn{background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--radius-sm);padding:14px;font-size:13.5px;color:#9A3412;margin-top:14px;}
.ptssteps{padding-left:20px;margin-top:6px;}
.ptssteps li{font-size:13.5px;margin-bottom:8px;color:var(--text-secondary);}
.ptsfresh{font-size:11.5px;color:var(--text-muted);margin-top:12px;font-style:italic;}

/* ACH */
.achrule{background:var(--blue-light);border-radius:var(--radius-sm);padding:14px;font-size:14px;color:var(--text-primary);}
.achtable td:last-child{text-align:right;font-weight:700;white-space:nowrap;}
.achtable .bad{color:var(--red);}
.achtable .good{color:var(--green-dark);}
.achtable tr.net td{border-top:2px solid var(--border);border-bottom:none;}
.achsteps{padding-left:20px;margin-top:6px;}
.achsteps li{font-size:13.5px;margin-bottom:8px;color:var(--text-secondary);}
.achnote{font-size:11.5px;color:var(--text-muted);margin-top:10px;font-style:italic;}
.pagebreak{break-inside:avoid;}

@media(max-width:560px){.card{padding:20px;}.dual{grid-template-columns:1fr;}.report-actions .btn-ghost{display:none;}}
@media print{
  .site-header,.report-actions,.no-print{display:none!important;}
  body{background:#fff;}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
  .banner{background:#059669!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>

<div id="report"><!-- rendered by JS --></div>

<script>
"use strict";
/* ============ SHARED CORE (identical math to the calculator) ============ */
/* =========================================================================
   VERIFIED CARD DATASET — rates verified as of 2026-05-30
   Only $0-annual-fee cards drive the headline number (so net = gross, never
   negative). Fee cards appear as optional "premium upgrades" with net math.
   Re-verify every 60–90 days and bump CARD_DATA_VERSION.
   ========================================================================= */
var CARD_DATA_VERSION = "May 30, 2026";

var BETA_SLOTS_TOTAL = 10, BETA_SLOTS_REMAINING = 6;
var LAUNCH_PRICE = 97, STANDARD_PRICE = 297;
var STRIPE_LINK = "https://buy.stripe.com/aFa6oHda38Dl1bg4962Ji01";
var GUARANTEE_AMOUNT = 3000;
var GUARANTEE_MIN_MONTHLY = 30000;
var FLAT_NOFEE_RATE = 0.02;          // Amex BBP / Blue Cash flat 2% (no fee), up to $50k combined
var FLAT_NOFEE_CAP = 50000;
var POST_CAP_FLAT = 0.01;

var BUSINESS_TYPES = [
  {id:"hvac",label:"HVAC Contractor",aud:"trades"},{id:"electrical",label:"Electrical",aud:"trades"},
  {id:"plumbing",label:"Plumbing / Pipefitting",aud:"trades"},{id:"welding",label:"Welding / Fabrication",aud:"trades"},
  {id:"cnc",label:"CNC / Machining",aud:"trades"},{id:"gc",label:"General Contractor",aud:"trades"},
  {id:"ecom",label:"E-Commerce / Online Store",aud:"ecom"},{id:"saas",label:"SaaS / Software",aud:"ecom"},
  {id:"agency",label:"Agency / Marketing",aud:"ecom"},{id:"other",label:"Other / General Operator",aud:"trades"}
];
function audience(){var b=BUSINESS_TYPES.find(function(x){return x.id===state.bizType;});return (b&&b.aud)||"trades";}

var CATEGORY_SETS = {
  trades:[
    {id:"materials",label:"Materials & Supplies",note:"Distributors, supply houses, parts, office supply"},
    {id:"software", label:"Software / SaaS",      note:"Field service apps, accounting, subscriptions"},
    {id:"fuel",     label:"Fuel / Gas",           note:"Fleet, trucks, equipment"},
    {id:"other",    label:"Other Business Spend", note:"Tools, travel, misc. operating costs"}
  ],
  ecom:[
    {id:"advertising",label:"Advertising / Marketing", note:"Google, Meta, TikTok, paid media"},
    {id:"software",   label:"Software / SaaS",         note:"Hosting, tools, subscriptions, cloud"},
    {id:"shipping",   label:"Shipping / Fulfillment",  note:"Carriers, 3PL, postage, packaging"},
    {id:"inventory",  label:"Inventory / COGS",        note:"Product, wholesale, manufacturing"}
  ]
};
function activeCategories(){ return CATEGORY_SETS[audience()]; }

var CURRENT_SETUP = [
  {id:"none",     label:"No business card",      rate:0.000, note:"Personal / debit / cash"},
  {id:"flat1",    label:"Basic 1% card",         rate:0.010, note:"Flat-rate, no category bonuses"},
  {id:"flat15",   label:"1.5% flat card",        rate:0.015, note:"Flat cash-back business card"},
  {id:"some",     label:"Some category rewards", rate:0.020, note:"One card with a couple bonus categories"},
  {id:"optimized",label:"Already well optimized",rate:0.030, note:"Multiple cards, category-matched"}
];

/* No-fee optimized rate model per category (cashback-equivalent). Verified cards.
   Flat categories use Wells Fargo Signify (uncapped 2%, no fee, no caps) as the
   backbone — cleaner and more accurate than capped 2% cards. Disclaimed as estimate. */
function noFeeCategoryYield(catId, annualSpend){
  var S = annualSpend;
  if(catId==="materials"){
    // Chase Ink Cash 5% (office supply) up to $25k, then U.S. Bank Triple Cash 3% (uncapped)
    var y = Math.min(S,25000)*0.05 + Math.max(0,S-25000)*0.03;
    return {yield:y, primary:"Chase Ink Business Cash", overflow:(S>25000?"U.S. Bank Triple Cash Rewards":null)};
  }
  if(catId==="fuel"){
    return {yield:S*0.03, primary:"U.S. Bank Triple Cash Rewards", overflow:null};
  }
  // software / other / advertising / shipping / inventory → no-fee flat 2% uncapped (Signify).
  // (True ad/SaaS/shipping spend has no >2% NO-FEE category card; the lift lives in premium cards.)
  return {yield:S*0.02, primary:"Wells Fargo Signify Business Cash", overflow:null};
}

/* No-fee signup bonuses (typical public offers; targeted offers vary) */
var NOFEE_BONUSES = [
  {card:"Chase Ink Business Cash",        value:750, minSpend:6000, months:3},
  {card:"Wells Fargo Signify Business Cash",value:500, minSpend:5000, months:3},
  {card:"U.S. Bank Triple Cash Rewards",  value:500, minSpend:4500, months:5}
];

/* Premium (fee) upgrades — shown conditionally with explicit NET math vs the 2% no-fee backbone.
   Amex Gold 4x covers advertising, shipping, software/cloud, gas (top 2 cats/cycle, $150k cap) —
   ideal for e-commerce. Ink Preferred 3x covers advertising, shipping, software, travel. */
function premiumUpgrades(spend){
  var aud = audience(), out = [];
  var sw = num(spend.software)*12, ad = num(spend.advertising)*12, ship = num(spend.shipping)*12, fuel = num(spend.fuel)*12;
  // Amex Business Gold: 4% (in points, valued conservatively) vs 2% backbone
  var goldElig = sw + (aud==="ecom" ? ad+ship : fuel);
  if(goldElig >= 25000){
    var goldNet = Math.min(goldElig,150000)*(0.04-0.02) - 375 + 240;
    if(goldNet > 0) out.push({name:"Amex Business Gold", fee:"$375/yr fee",
      why:(aud==="ecom"
        ? "4x points on your top two of advertising, shipping, and software/cloud each cycle (up to $150k/yr) — built for online businesses."
        : "4x points on your top two spend categories each cycle (software/cloud, gas, advertising, restaurants) up to $150k/yr."),
      net:goldNet, fine:"Points valued conservatively at 1¢ (worth more via Amex travel partners). Net assumes you use the ~$240/yr statement credits. Welcome offer is targeted and varies."});
  }
  // Chase Ink Preferred: 3% (points) vs 2% backbone
  var prefElig = sw + (aud==="ecom" ? ad+ship : 0);
  if(prefElig >= 20000){
    var prefNet = Math.min(prefElig,150000)*(0.03-0.02) - 95;
    if(prefNet > 0) out.push({name:"Chase Ink Business Preferred", fee:"$95/yr fee",
      why:"3x points on advertising (social/search), shipping, internet/phone, and travel; points worth ~25% more through Chase Travel or transfer partners.",
      net:prefNet, fine:"100,000-point welcome bonus (~$1,000 cash / $1,250 travel) after $8k spend in 3 months — not included above."});
  }
  return out.sort(function(a,b){return b.net-a.net;});
}

var STEPS = ["Mode","Business","Spend","Cards","Points","Results"];

var state = {
  step:0, mode:"", bizType:"", monthlyRevenue:"",
  spend:{materials:"",software:"",fuel:"",other:"",advertising:"",shipping:"",inventory:""},
  currentSetup:"", hasPoints:"", pointsBalance:"",
  // detailed-mode levers
  supplierSurcharge:"", earlyPayDiscount:"", resaleMaterials:"",
  email:"", submitted:false, errors:{}
};


function num(v){var n=parseFloat(String(v).replace(/[^0-9.]/g,""));return isNaN(n)?0:n;}
function money(n){return "$"+Math.round(n).toLocaleString("en-US");}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function totalMonthly(){var t=0;activeCategories().forEach(function(c){t+=num(state.spend[c.id]);});return t;}
function bizLabel(){var b=BUSINESS_TYPES.find(function(x){return x.id===state.bizType;});return b?b.label:"your business";}
function isDetailed(){return state.mode==="detailed";}
function guaranteeApplies(){return totalMonthly()>=GUARANTEE_MIN_MONTHLY;}

/* ---- CORE CALC ---- */
function calc(){
  var setup = CURRENT_SETUP.find(function(s){return s.id===state.currentSetup;}) || CURRENT_SETUP[1];
  var perCat = [], optimizedGross = 0, usedCards = {};
  activeCategories().forEach(function(c){
    var annual = num(state.spend[c.id])*12;
    var r = noFeeCategoryYield(c.id, annual);
    optimizedGross += r.yield;
    if(annual>0){ usedCards[r.primary]=true; if(r.overflow) usedCards[r.overflow]=true; }
    var curYield = (setup.id==="optimized") ? r.yield*0.9 : annual*setup.rate;
    perCat.push({id:c.id,label:c.label,annualSpend:annual,current:curYield,optimal:r.yield,primary:r.primary});
  });
  var totalAnnual = totalMonthly()*12;
  var currentYield = (setup.id==="optimized") ? optimizedGross*0.9 : totalAnnual*setup.rate;
  var recoverableSteady = Math.max(0, optimizedGross - currentYield);

  // signup bonuses: top 2 feasible no-fee cards in the recommended stack
  var feasible = NOFEE_BONUSES.filter(function(b){
    return usedCards[b.card] && (totalMonthly()*b.months >= b.minSpend);
  }).sort(function(a,b){return b.value-a.value;});
  var bonusTop2 = feasible.slice(0,2);
  var bonusTotal = bonusTop2.reduce(function(s,b){return s+b.value;},0);

  var firstYearValue = recoverableSteady + bonusTotal;
  var optimizationPct = optimizedGross>0 ? Math.round((currentYield/optimizedGross)*100) : 0;
  if(optimizationPct>100) optimizationPct=100;
  var bottomPct = Math.max(5, Math.min(95, 100-optimizationPct));
  var fiveYear = recoverableSteady*5 + bonusTotal; // bonuses are one-time

  return {
    setup:setup, perCat:perCat, optimizedGross:optimizedGross, currentYield:currentYield,
    recoverableSteady:recoverableSteady, firstYearValue:firstYearValue, bonusTotal:bonusTotal,
    bonusTop2:bonusTop2, stack:Object.keys(usedCards), premiums:premiumUpgrades(state.spend),
    optimizationPct:optimizationPct, bottomPct:bottomPct, fiveYear:fiveYear
  };
}
/* ============ END SHARED CORE ============ */

/* ---- card detail metadata: why each card wins + earn structure ---- */
var CARD_DETAIL = {
  "Chase Ink Business Cash": {
    rate:"5% back on the first $25,000/yr at office-supply stores and on internet/cable/phone; 2% at gas stations and restaurants (first $25k); 1% after.",
    why:"For materials and supplies bought through office-supply channels, 5% is the highest no-fee rate available anywhere. Most contractors run far more through supply houses than they realize.",
    bonus:"$750 cash back after $6,000 spend in 3 months."
  },
  "U.S. Bank Triple Cash Rewards": {
    rate:"3% back on gas/EV charging (transactions up to $200), office supply, cell-phone service, and restaurants — no annual cap; 1% on everything else. Plus a $100/yr software credit.",
    why:"The only no-fee card that pays 3% on fuel with no cap, which is why it anchors the fuel category for trades fleets. The uncapped structure beats cards that throttle after a spend limit.",
    bonus:"$500 after $4,500 spend in 5 months."
  },
  "Wells Fargo Signify Business Cash": {
    rate:"Flat 2% cash back on every purchase, uncapped, with no annual fee and no category tracking.",
    why:"For advertising, software, shipping, and general spend there is no no-fee card paying more than ~2% reliably — so a clean, uncapped 2% on everything is the honest best no-fee backbone. No caps to blow through, no categories to manage. The real upside above 2% lives in the premium cards below.",
    bonus:"$500 after $5,000 spend in 3 months."
  },
  "Amex Blue Business Plus": {
    rate:"2x Membership Rewards points on the first $50,000/yr of everyday purchases, then 1x. No annual fee.",
    why:"Points can be worth more than 2% if transferred to Amex travel partners, making this a flexible no-fee base for businesses that travel.",
    bonus:"15,000 points (~$150+) after $3,000 spend in 3 months."
  }
};

/* ---- points redemption reference (verified June 2026 — see sources in research file) ---- */
var POINTS_REDEMPTION = [
  {type:"Statement credit / cash back", cpp:"1.0¢", note:"The floor — simplest and always available, but usually the lowest value."},
  {type:"Gift cards", cpp:"0.8–1.0¢", note:"Often at or below cash. Generally avoid unless a bonus promo applies."},
  {type:"Travel via the card's portal", cpp:"1.0–1.5¢", note:"Chase Ink Preferred ≈ 1.25¢; Amex & Capital One ≈ 1.0¢. Easy, no transfers."},
  {type:"Transfer to airline/hotel partners", cpp:"1.5–2.0¢+", note:"Highest value (Chase UR up to ~2.05¢, Amex ~2.0¢, Cap One ~1.85¢) — but requires a trip to use them on."}
];
/* monthly freshness stamp */
function weekStamp(){
  var d = new Date();
  return d.toLocaleString("en-US",{month:"long",year:"numeric"});
}


/* ---- decode URL params into state ---- */
function loadStateFromURL(){
  var qs = new URLSearchParams(window.location.search);
  // fallback to sessionStorage if Stripe stripped params
  if(![...qs.keys()].length){
    try{ var saved = sessionStorage.getItem("seo_report"); if(saved) qs = new URLSearchParams(saved); }catch(_){}
  }
  if(qs.get("biz")) state.bizType = qs.get("biz");
  if(qs.get("mode")) state.mode = qs.get("mode");
  if(qs.get("setup")) state.currentSetup = qs.get("setup");
  if(qs.get("pts")) state.hasPoints = qs.get("pts");
  if(qs.get("ptsbal")) state.pointsBalance = qs.get("ptsbal");
  if(qs.get("ss")) state.supplierSurcharge = qs.get("ss");
  if(qs.get("ep")) state.earlyPayDiscount = qs.get("ep");
  if(qs.get("rm")) state.resaleMaterials = qs.get("rm");
  if(qs.get("em")) state.email = qs.get("em");
  // spend categories: keys like s_materials, s_advertising
  ["materials","software","fuel","other","advertising","shipping","inventory"].forEach(function(k){
    var v = qs.get("s_"+k);
    if(v!=null && v!=="") state.spend[k] = v;
  });
  return !!state.bizType && totalMonthly()>0;
}

function esc2(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

function renderReport(){
  var ok = loadStateFromURL();
  var el = document.getElementById("report");
  if(!ok){
    el.innerHTML = '<div class="wrap"><div class="err-state"><h1>We couldn\u2019t load your report details</h1>'+
      '<p>It looks like your report data didn\u2019t carry over. This can happen if the link was opened on a different device. '+
      'Email <a href="mailto:Dave@SkilledEdge.io">Dave@SkilledEdge.io</a> with the email you used at checkout and we\u2019ll send your full report right away.</p>'+
      '<a class="btn btn-blue" href="https://www.skillededge.io/card-optimizer/">Re-run the optimizer</a></div></div>';
    return;
  }
  var r = calc();
  var bizName = (BUSINESS_TYPES.find(function(b){return b.id===state.bizType;})||{label:"your business"}).label;
  var setupLabel = (CURRENT_SETUP.find(function(s){return s.id===state.currentSetup;})||{label:""}).label;
  var maxOpt = Math.max.apply(null, r.perCat.map(function(c){return c.optimal;}).concat([1]));

  var bars = r.perCat.filter(function(c){return c.optimal>0;}).map(function(c){
    var curW=(c.current/maxOpt)*100, optW=(c.optimal/maxOpt)*100, gain=c.optimal-c.current;
    return '<div class="bar-row"><div class="bl"><span>'+esc2(c.label)+'</span><span class="gain">+'+money(gain)+'/yr</span></div>'+
      '<div class="bar-track"><div class="bar-opt" style="width:'+optW+'%">'+money(c.optimal)+'</div><div class="bar-cur" style="width:'+curW+'%"></div></div></div>';
  }).join("");

  // ---- NO-FEE CARD STACK with worked math per card ----
  var catLabelFor = {};
  r.perCat.forEach(function(c){ catLabelFor[c.primary] = (catLabelFor[c.primary]||[]).concat(c); });
  var stack = r.stack.map(function(name,i){
    var d = CARD_DETAIL[name] || {rate:"",why:"",bonus:""};
    // worked math: find the categories this card is primary for
    var cats = catLabelFor[name] || [];
    var mathRows = cats.filter(function(c){return c.annualSpend>0;}).map(function(c){
      var monthly = c.annualSpend/12;
      return '<li>Your <b>'+esc2(c.label.toLowerCase())+'</b>: '+money(monthly)+'/mo \u00d7 12 = <b>'+money(c.annualSpend)+'/yr</b> \u2192 earns about <b>'+money(c.optimal)+'/yr</b> on this card'+
        (c.current>0?' (vs. '+money(c.current)+' on your current setup \u2014 a <b style="color:var(--green-dark)">+'+money(c.optimal-c.current)+'/yr</b> gain)':'')+'.</li>';
    }).join("");
    var bonusLine = d.bonus ? '<div class="cardbonus">\ud83c\udf81 <b>Signup bonus:</b> '+esc2(d.bonus)+'</div>' : "";
    return '<div class="rec '+(i===0?"top":"")+'">'+(i===0?'<span class="tag">Start here</span>':'')+
      '<h4>'+esc2(name)+' <span class="fee">$0 annual fee</span></h4>'+
      '<div class="cardrate"><b>How it earns:</b> '+esc2(d.rate)+'</div>'+
      '<div class="cardwhy"><b>Why it\u2019s in your stack:</b> '+esc2(d.why)+'</div>'+
      (mathRows?'<div class="cardmath"><div class="mathlabel">The math on your spend:</div><ul>'+mathRows+'</ul></div>':'')+
      bonusLine+'</div>';
  }).join("");

  var prem = r.premiums.length ? '<div class="card"><h2 class="sec">\u2b50 Optional premium upgrades</h2>'+
    '<p class="secsub">These carry an annual fee but pay off for your spend \u2014 shown net of the fee.</p>'+
    r.premiums.map(function(p){return '<div class="rec premium"><span class="tag">+'+money(p.net)+'/yr net</span><h4>'+esc2(p.name)+' <span class="fee">'+esc2(p.fee)+'</span></h4><div class="why">'+esc2(p.why)+'</div><div class="yield">Net benefit after fee: '+money(p.net)+'/yr</div><div class="fine">'+esc2(p.fine)+'</div></div>';}).join("")+'</div>' : "";

  // ---- DETAILED WEEK-BY-WEEK ACTION PLAN ----
  var c1 = r.stack[0], c2 = r.stack[1];
  var biggestCat = r.perCat.slice().sort(function(a,b){return b.annualSpend-a.annualSpend;})[0];
  var planSteps = [];
  if(c1){
    var d1 = CARD_DETAIL[c1]||{};
    planSteps.push('<b>Days 1\u20133 \u2014 Apply for the '+esc2(c1)+'.</b> This is your highest-impact no-fee card. Apply online (about 10 minutes; you\u2019ll need your EIN or SSN and rough annual revenue). '+
      (d1.bonus?'It carries a '+esc2(d1.bonus.toLowerCase())+' '+'<br><span class="ex">Example: '+(biggestCat&&biggestCat.annualSpend>0?'route your '+esc2(biggestCat.label.toLowerCase())+' ('+money(biggestCat.annualSpend/12)+'/mo) to this card and you\u2019ll clear the minimum spend naturally without buying anything extra.':'put your regular operating spend on it to hit the minimum without overspending.')+'</span>':''));
  }
  planSteps.push('<b>Days 4\u20137 \u2014 Set up auto-pay in full.</b> The day the card arrives, log in and set auto-pay to the <b>full statement balance</b> (not the minimum). This single setting is what protects every dollar of rewards. '+
    '<br><span class="ex">Example: on '+money(totalMonthly())+'/mo of spend, carrying even one month\u2019s balance at 24% APR would cost about '+money(totalMonthly()*0.24/12)+' in interest \u2014 wiping out a month of rewards. Auto-pay-in-full makes that impossible.</span>');
  if(c2){
    planSteps.push('<b>Days 8\u201314 \u2014 Add the '+esc2(c2)+'.</b> Once the first card is active, add your second card to cover your next-biggest category. Keep each card to the categories where it earns the most \u2014 don\u2019t put materials spend on the ad-spend card, etc.');
  }
  if(state.supplierSurcharge==="yes"){
    planSteps.push('<b>Days 8\u201314 \u2014 Audit supplier card fees.</b> Call or check the invoices from your top 3\u20135 suppliers. Ask: \u201cdo you charge a fee for card payment, and do you accept ACH?\u201d For any that surcharge, switch to ACH (see the ACH section below for the exact math).');
  }
  if(r.premiums.length){
    var p0 = r.premiums[0];
    planSteps.push('<b>Days 15\u201330 \u2014 Evaluate the premium upgrade ('+esc2(p0.name)+').</b> Only after your no-fee base is running clean. It nets <b>'+money(p0.net)+'/yr</b> after its fee on your spend \u2014 worth it if you\u2019ll actually use the bonus categories. If your spend dips, the no-fee stack alone still captures most of the value.');
  }
  if(state.earlyPayDiscount==="yes"){
    planSteps.push('<b>Ongoing \u2014 Take early-payment discounts.</b> Any supplier offering \u201c2/10 net 30\u201d gives 2% off for paying in 10 days instead of 30 \u2014 about a 36% annualized return on that cash. Prioritize these whenever cash flow allows; they beat almost any card reward.');
  }
  planSteps.push('<b>Day 30 \u2014 Bank the win, then review quarterly.</b> Your cards are now matched to your spend and auto-paying in full. Re-check your numbers each quarter: card offers and your spend mix both change. Re-run this optimizer anytime your spend shifts meaningfully.');

  // levers
  var ecom = audience()==="ecom";
  var levers = [];
  if(ecom){
    levers.push({t:"Run all ad spend through your highest-earning card",p:"Google, Meta, and TikTok don\u2019t surcharge cards \u2014 so your single biggest line should always earn rewards. With a 4x card, that\u2019s real money on advertising."});
    levers.push({t:"Use a 0% foreign-transaction card for overseas suppliers",p:"A 3% FX fee quietly eats margin on imports. Ink Preferred, Amex Gold, and Capital One charge 0% \u2014 route international buys there."});
  }
  if(state.earlyPayDiscount==="yes") levers.push({t:"Take early-payment / trade discounts",p:"\u201c2/10 net 30\u201d = 2% off for paying in 10 days \u2248 36% annualized. Prioritize these against your cash flow."});
  if(state.resaleMaterials==="yes") levers.push({t:(ecom?"Resale certificate on inventory / COGS":"Sales-tax exemption on resale materials"),p:"Goods bought for resale can often be purchased tax-exempt with a resale certificate. Confirm with your CPA \u2014 can be thousands per year."});
  levers.push({t:"Use a line of credit for float, never balances",p:"A business LOC (8\u201314%) is far cheaper than carrying a card balance (17\u201327%). Use cards for rewards + 0% intro periods, then clear them before interest hits."});
  var leversHTML = levers.map(function(l){return '<div class="lever"><h4>'+esc2(l.t)+'</h4><p>'+esc2(l.p)+'</p></div>';}).join("");

  // ---- FULL POINTS PAGE ----
  var ptsNum = num(state.pointsBalance);
  var pointsPage = "";
  if(state.hasPoints==="yes" && ptsNum>0){
    var cashVal = ptsNum*0.01, portalVal = ptsNum*0.0125, transferLow = ptsNum*0.015, transferHigh = ptsNum*0.02;
    var redemptionRows = POINTS_REDEMPTION.map(function(rr){
      return '<tr><td><b>'+esc2(rr.type)+'</b></td><td class="cpp">'+esc2(rr.cpp)+'</td><td>'+esc2(rr.note)+'</td></tr>';
    }).join("");
    pointsPage =
      '<div class="card pagebreak"><h2 class="sec">\ud83d\udcb3 Your idle points \u2014 worth '+money(cashVal)+' to '+money(transferHigh)+' right now</h2>'+
      '<p class="secsub">You told us you have about <b>'+ptsNum.toLocaleString()+'</b> points/miles sitting unused. Here\u2019s exactly what they\u2019re worth and what to do.</p>'+
      '<div class="ptsgrid">'+
        '<div class="ptsbox"><div class="l">Cash value (floor)</div><div class="v">'+money(cashVal)+'</div><div class="n">'+ptsNum.toLocaleString()+' \u00d7 1.0\u00a2</div></div>'+
        '<div class="ptsbox"><div class="l">Travel portal</div><div class="v">'+money(portalVal)+'</div><div class="n">at ~1.25\u00a2 each</div></div>'+
        '<div class="ptsbox best"><div class="l">Transfer partners</div><div class="v">'+money(transferLow)+'\u2013'+money(transferHigh)+'</div><div class="n">at 1.5\u20132.0\u00a2+ each</div></div>'+
      '</div>'+
      '<div class="mathlabel" style="margin-top:18px">How much each redemption type is worth (cents per point):</div>'+
      '<table class="ptstable"><thead><tr><th>Redemption type</th><th>Value/point</th><th>When to use it</th></tr></thead><tbody>'+redemptionRows+'</tbody></table>'+
      '<div class="ptswarn"><b>\u26a0\ufe0f Why you shouldn\u2019t let them sit:</b> Card programs periodically devalue points \u2014 the same points buy less after a program change, and these happen with little warning. Recent real example: in January 2026, Capital One cut its Emirates transfer rate by 25% (1,000 miles became 750). Your '+ptsNum.toLocaleString()+' points only lose purchasing power the longer they sit \u2014 a 15% devaluation would cost you roughly <b>'+money(cashVal*0.15)+'\u2013'+money(transferHigh*0.15)+'</b> of today\u2019s value.</div>'+
      '<div class="mathlabel" style="margin-top:16px">What to do:</div>'+
      '<ul class="ptssteps">'+
        '<li><b>If you travel for business:</b> transfer to an airline/hotel partner for a specific trip \u2014 that\u2019s where you hit 1.5\u20132\u00a2+ and get the most out of them. Check your program\u2019s current transfer ratios first (they change).</li>'+
        '<li><b>If you don\u2019t travel much:</b> redeem for cash/statement credit now at 1\u00a2 rather than letting them devalue. '+money(cashVal)+' in hand beats '+money(cashVal)+' that erodes.</li>'+
        '<li><b>Avoid gift-card redemptions</b> \u2014 they\u2019re usually at or below cash value, so you\u2019re leaving money on the table versus just taking cash.</li>'+
        '<li><b>Example:</b> 89,000 Amex points transferred to a partner for a $1,600 flight = ~1.8\u00a2/point ($1,600 value). The same points as a statement credit = $890. The transfer nearly doubles their value \u2014 but only if you have a trip to use them on.</li>'+
      '</ul>'+
      '<div class="ptsfresh">Point values verified as of '+weekStamp()+' from issuer sites and major points trackers. Programs change often \u2014 confirm your specific program\u2019s current transfer ratios before redeeming.</div>'+
      '</div>';
  }

  // ---- ACH HALF-PAGE (when supplier surcharge applies) ----
  var achSection = "";
  if(state.supplierSurcharge==="yes"){
    // use their biggest non-ad category as the worked example base
    var achCat = r.perCat.slice().filter(function(c){return c.id!=="advertising";}).sort(function(a,b){return b.annualSpend-a.annualSpend;})[0];
    var exMonthly = achCat && achCat.annualSpend>0 ? achCat.annualSpend/12 : 20000;
    var exOrder = Math.round(exMonthly*0.6/1000)*1000 || 20000; // representative large order
    var surcharge = exOrder*0.03, reward = exOrder*0.02, netSave = surcharge-reward;
    achSection =
      '<div class="card"><h2 class="sec">\ud83c\udfe6 When to pay by ACH instead of card</h2>'+
      '<p class="secsub">You told us some suppliers charge a fee for card payments. Here\u2019s the exact rule and the math.</p>'+
      '<div class="achrule"><b>The rule:</b> If a supplier\u2019s card surcharge is <u>higher</u> than the rewards you\u2019d earn, pay by ACH. If it\u2019s <u>lower</u> (or zero), keep it on your rewards card. It\u2019s that simple \u2014 compare the two numbers on every large invoice.</div>'+
      '<div class="mathlabel" style="margin-top:14px">Worked example on a '+money(exOrder)+' order:</div>'+
      '<table class="achtable"><tbody>'+
        '<tr><td>Pay by <b>card</b> \u2014 3% surcharge</td><td class="bad">\u2212'+money(surcharge)+'</td></tr>'+
        '<tr><td>\u2026 but you\u2019d earn ~2% rewards back</td><td class="good">+'+money(reward)+'</td></tr>'+
        '<tr class="net"><td><b>Net cost of paying by card</b></td><td class="bad"><b>\u2212'+money(netSave)+'</b></td></tr>'+
        '<tr class="net"><td><b>Pay by ACH instead</b></td><td class="good"><b>'+money(0)+' fee \u2192 save '+money(netSave)+'</b></td></tr>'+
      '</tbody></table>'+
      '<div class="mathlabel" style="margin-top:14px">How to minimize fees in practice:</div>'+
      '<ul class="achsteps">'+
        '<li><b>Ask every major supplier two questions:</b> \u201cDo you charge a fee for card payment?\u201d and \u201cDo you accept ACH/bank transfer free?\u201d Most distributors do both \u2014 they just don\u2019t advertise the free ACH option.</li>'+
        '<li><b>Set a threshold.</b> A simple rule: any invoice over ~'+money(Math.max(2000,Math.round(exOrder*0.25/500)*500))+' that carries a card surcharge goes ACH; smaller ones stay on the card for the rewards and simplicity. Pick a line that fits your bookkeeping.</li>'+
        '<li><b>Negotiate the surcharge away.</b> Some suppliers will waive the card fee for a reliable customer who asks \u2014 then you get rewards AND no fee. Always worth one ask.</li>'+
        '<li><b>Use ACH for recurring/large fixed costs</b> (rent, big standing orders) where there\u2019s no card-reward category bonus anyway \u2014 you lose nothing and avoid any processing fee.</li>'+
        '<li><b>Keep no-surcharge spend on cards.</b> Ad platforms, software, fuel, and most retail don\u2019t surcharge \u2014 those should always run through your rewards cards.</li>'+
      '</ul>'+
      '<div class="achnote">Note: surcharge rates and ACH availability vary by supplier. The 3% / 2% figures above are typical; use your supplier\u2019s actual numbers to decide each time.</div>'+
      '</div>';
  }

  var firstYearLine = r.bonusTotal>0 ?
    '<div class="dual"><div class="box"><div class="l">Recurring / year</div><div class="v">'+money(r.recoverableSteady)+'</div><div class="n">every year, net of fees</div></div>'+
    '<div class="box first"><div class="l">First-year value</div><div class="v">'+money(r.firstYearValue)+'</div><div class="n">incl. '+money(r.bonusTotal)+' signup bonuses</div></div></div>' :
    '<div class="dual"><div class="box first" style="grid-column:1/-1"><div class="l">Recurring recovery / year</div><div class="v">'+money(r.recoverableSteady)+'</div><div class="n">from optimized rewards, net of fees</div></div></div>';

  el.innerHTML =
    '<div class="banner"><div class="ok">\u2705 Payment confirmed \u2014 here\u2019s your report</div>'+
      '<h1>Your Card &amp; Payment Optimizer Report</h1>'+
      '<p>Personalized for '+esc2(bizName)+' \u00b7 '+money(totalMonthly())+'/mo in business spend</p></div>'+
    '<div class="wrap">'+
      '<div class="card"><div class="rhero"><div class="label">Your first-year Recovery Number</div>'+
        '<div class="big">'+money(r.firstYearValue)+'</div>'+
        '<div class="sub">currently leaving an estimated '+money(r.recoverableSteady)+'/yr in recurring value on the table</div></div>'+
        firstYearLine+'</div>'+

      '<div class="card"><h2 class="sec">\ud83d\udcca Where the money is</h2><p class="secsub">What you capture now vs. what an optimized setup earns, by category.</p>'+
        bars+'<div class="bar-legend"><span><span class="swatch cur"></span>Capturing now</span><span><span class="swatch opt"></span>Optimized (no-fee)</span></div></div>'+

      '<div class="card"><h2 class="sec">\ud83d\udcb3 Your no-fee card stack</h2><p class="secsub">Built around your spend. Open in the order shown in the 30-day plan below.</p>'+stack+'</div>'+

      prem+

      '<div class="card"><h2 class="sec">\ud83d\uddd3\ufe0f Your 30-day action plan</h2><p class="secsub">Exact order and timing to capture the value above.</p>'+
        '<ul class="step-list">'+planSteps.map(function(s){return '<li>'+s+'</li>';}).join("")+'</ul></div>'+

      '<div class="card playbook"><h2 class="sec">\ud83d\udd01 Pay-in-full &amp; 0% APR playbook</h2><p class="secsub">How to keep 100% of what you earn.</p>'+
        '<ul><li><b>Pay every card in full, every month.</b> Rewards are 2\u20135%; card interest is 17\u201327%. One carried balance erases a year of rewards. Set auto-pay to the full statement balance.</li>'+
        '<li><b>Use 0% intro-APR periods for big purchases.</b> Several of your recommended cards offer ~12 months at 0% on purchases \u2014 ideal for a large equipment or inventory buy you\u2019ll pay off over the year, interest-free, while still earning rewards.</li>'+
        '<li><b>Time big buys to signup bonuses.</b> Make planned large purchases right after opening a card to hit the minimum-spend bonus faster.</li>'+
        '<li><b>Never let rewards tempt overspending.</b> The goal is optimizing spend you\u2019d make anyway \u2014 not spending more to chase points.</li></ul></div>'+

      '<div class="card"><h2 class="sec">\ud83d\udcb0 Beyond the card \u2014 more recovery levers</h2><p class="secsub">Payment-method moves that often beat card rewards outright.</p>'+leversHTML+'</div>'+

      achSection+

      pointsPage+

      '<div class="card" style="background:#F0FDF8;border-color:var(--green)"><h2 class="sec">\ud83d\udee1\ufe0f Your guarantee</h2>'+
        (r.firstYearValue>=GUARANTEE_AMOUNT
          ? '<p style="font-size:14px;color:var(--text-secondary)">This report identifies <b>'+money(r.firstYearValue)+'</b> in first-year value \u2014 well above the $3,000 minimum. If you implement the plan and don\u2019t find at least '+money(GUARANTEE_AMOUNT)+' in identified value, email us for a full refund.</p>'
          : '<p style="font-size:14px;color:var(--text-secondary)">If this report didn\u2019t identify real value worth more than you paid, email <a href="mailto:Dave@SkilledEdge.io">Dave@SkilledEdge.io</a> for a full refund \u2014 no questions asked.</p>')+'</div>'+

      '<div class="verified">Card rates and offers verified as of '+CARD_DATA_VERSION+'. Offers change often and some signup bonuses are targeted \u2014 confirm current terms on the issuer\u2019s site before applying. Figures are good-faith estimates based on the numbers you entered, not guarantees, and not financial, tax, or legal advice.</div>'+
      '<div class="foot"><p>Questions about your report? Email <a href="mailto:Dave@SkilledEdge.io">Dave@SkilledEdge.io</a></p><p>\u00a9 2026 Skilled Edge Group</p></div>'+
    '</div>';
}
renderReport();
</script>
